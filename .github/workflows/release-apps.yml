name: Release Apps
on:
  push:
    branches: [main]
    paths: ['apps/**']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate manifests
        run: bash test/validate-manifests.sh

      - name: Run tests
        run: npm test

      - name: Detect changed apps
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- apps/ | cut -d/ -f2 | sort -u)
          echo "apps=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed apps: $CHANGED"

      - name: Validate manifests
        run: ./test/validate-manifests.sh

      - name: Build and release each changed app
        run: |
          for APP in ${{ steps.changes.outputs.apps }}; do
            APP_DIR="apps/$APP"
            [ -f "$APP_DIR/manifest.yml" ] || continue

            VERSION=$(grep '^version:' "$APP_DIR/manifest.yml" | awk '{print $2}' | tr -d '"' | tr -d "'")
            [ -z "$VERSION" ] && VERSION="0.1.0"
            TAG="${APP}-v${VERSION}"

            echo "📦 Building ${APP} v${VERSION}..."

            # Bundle dependencies: if the app has an install.sh that references
            # external binaries, download them and include in the zip
            if grep -q "CLIProxyAPI" "$APP_DIR/scripts/install.sh" 2>/dev/null; then
              echo "  Bundling CLIProxyAPI binary..."
              mkdir -p "$APP_DIR/bin"
              CLIPROXY_TAG=$(curl -sL https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | jq -r '.tag_name')
              CLIPROXY_VERSION=${CLIPROXY_TAG#v}
              for ARCH in amd64 arm64; do
                curl -sfL "https://github.com/router-for-me/CLIProxyAPI/releases/download/${CLIPROXY_TAG}/CLIProxyAPI_${CLIPROXY_VERSION}_linux_${ARCH}.tar.gz" \
                  -o "/tmp/cliproxy-${ARCH}.tar.gz"
                mkdir -p "$APP_DIR/bin/${ARCH}"
                tar -xzf "/tmp/cliproxy-${ARCH}.tar.gz" -C "$APP_DIR/bin/${ARCH}" cli-proxy-api
                rm -f "/tmp/cliproxy-${ARCH}.tar.gz"
              done
              echo "  Bundled CLIProxyAPI ${CLIPROXY_VERSION} (amd64 + arm64)"
            fi

            # Zip the app directory (files at root, not nested under apps/slug/)
            (cd "$APP_DIR" && zip -r "/tmp/${APP}-${VERSION}.zip" . -x "*.git*")

            # Clean up bundled binaries from source tree (don't commit them)
            rm -rf "$APP_DIR/bin/amd64" "$APP_DIR/bin/arm64"

            # Create or update release
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG exists — updating asset"
              gh release upload "$TAG" "/tmp/${APP}-${VERSION}.zip#${APP}-${VERSION}.zip" --clobber
            else
              echo "Creating release $TAG"
              gh release create "$TAG" \
                "/tmp/${APP}-${VERSION}.zip#${APP}-${VERSION}.zip" \
                --title "@${APP} v${VERSION}" \
                --notes "Auto-release from push to main (includes CLIProxyAPI ${CLIPROXY_VERSION:-n/a})" \
                --latest=false
            fi

            echo "✅ Released: https://github.com/${{ github.repository }}/releases/download/${TAG}/${APP}-${VERSION}.zip"
          done
        env:
          GH_TOKEN: ${{ github.token }}
