name: Release Apps
on:
  push:
    branches: [main]
    paths: ['apps/**']

permissions:
  contents: write

jobs:
  validate:
    # Pre-release gate. Fails the run before any release is cut if any
    # app's manifest.yml is malformed or any .js entry point has a syntax
    # error. Keeps bad builds from reaching end users.
    runs-on: ubuntu-latest
    steps:
      # Pin actions/checkout to the current v4 SHA so a tag-overwrite attack
      # on the action repository cannot swap in malicious checkout logic at
      # release time. `# v4` comment preserves human-readability.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate all manifests (YAML parse + required fields)
        run: |
          set -euo pipefail
          # Install a small YAML parser — pipx ensures it's isolated.
          python3 -m pip install --quiet pyyaml
          fail=0
          # Extended glob: validate manifests across ALL component kinds, not
          # just apps/. Agents, skills, and tools all publish manifest.yml
          # files; skipping them here meant a broken agent/skill manifest
          # shipped straight to users.
          shopt -s nullglob
          for m in apps/*/manifest.yml agents/*/manifest.yml skills/*/manifest.yml tools/*/manifest.yml; do
            echo "Validating $m"
            python3 - <<PY || { echo "::error file=$m::manifest validation failed"; fail=1; }
          import sys, yaml
          with open("$m") as f:
              try:
                  data = yaml.safe_load(f)
              except yaml.YAMLError as e:
                  sys.exit(f"YAML parse error: {e}")
          if not isinstance(data, dict):
              sys.exit("Top-level must be a mapping")
          for field in ("slug", "identifier", "name", "version"):
              if field not in data:
                  sys.exit(f"Missing required field: {field}")
          PY
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi

      - name: Syntax-check all JS entry points
        run: |
          set -euo pipefail
          fail=0
          # node --check statically parses the file without executing it.
          # Covers both ESM and CJS.
          while IFS= read -r f; do
            echo "node --check $f"
            node --check "$f" || { echo "::error file=$f::syntax error"; fail=1; }
          done < <(find apps -maxdepth 3 -type f \( -name 'index.js' -o -name 'server.js' -o -name 'bridge.js' \))
          if [ "$fail" -ne 0 ]; then exit 1; fi

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      # Pin actions/checkout to the current v4 SHA so a tag-overwrite attack
      # on the action repository cannot swap in malicious checkout logic at
      # release time. `# v4` comment preserves human-readability.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect changed apps
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-list --max-parents=0 HEAD | head -1)
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" -- apps/ | cut -d/ -f2 | sort -u)
          echo "apps=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed apps: $CHANGED"

      - name: Build and release each changed app
        # Route step-output values (which come from repo contents — directory
        # names committed by authorized contributors) through `env:` rather
        # than embedding them directly in the shell block. GitHub literally
        # substitutes `${{ ... }}` into the script before bash parses it, so
        # a directory name containing shell metacharacters would execute as
        # code. Passing via env keeps the value as a parameter.
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGED_APPS: ${{ steps.changes.outputs.apps }}
        run: |
          set -euo pipefail
          for APP in $CHANGED_APPS; do
            APP_DIR="apps/$APP"
            [ -f "$APP_DIR/manifest.yml" ] || continue

            VERSION=$(grep '^version:' "$APP_DIR/manifest.yml" | awk '{print $2}' | tr -d '"' | tr -d "'")
            [ -z "$VERSION" ] && VERSION="0.1.0"
            TAG="${APP}-v${VERSION}"

            echo "📦 Building ${APP} v${VERSION}..."

            # Bundle dependencies: if the app has an install.sh that references
            # external binaries, download them and include in the zip
            if grep -q "CLIProxyAPI" "$APP_DIR/scripts/install.sh" 2>/dev/null; then
              echo "  Bundling CLIProxyAPI binary..."
              mkdir -p "$APP_DIR/bin"
              CLIPROXY_TAG=$(curl -sL https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | jq -r '.tag_name')
              CLIPROXY_VERSION=${CLIPROXY_TAG#v}
              for ARCH in amd64 arm64; do
                curl -sfL "https://github.com/router-for-me/CLIProxyAPI/releases/download/${CLIPROXY_TAG}/CLIProxyAPI_${CLIPROXY_VERSION}_linux_${ARCH}.tar.gz" \
                  -o "/tmp/cliproxy-${ARCH}.tar.gz"
                mkdir -p "$APP_DIR/bin/${ARCH}"
                tar -xzf "/tmp/cliproxy-${ARCH}.tar.gz" -C "$APP_DIR/bin/${ARCH}" cli-proxy-api
                rm -f "/tmp/cliproxy-${ARCH}.tar.gz"
              done
              echo "  Bundled CLIProxyAPI ${CLIPROXY_VERSION} (amd64 + arm64)"
            fi

            # Zip the app directory (files at root, not nested under apps/slug/)
            (cd "$APP_DIR" && zip -r "/tmp/${APP}-${VERSION}.zip" . -x "*.git*")

            # Publish SHA-256 alongside the zip. The workspace-agent bridge
            # enforces `msg.sha256` on every install; the router must hand it
            # the pre-computed digest rather than re-computing from the zip
            # at publish time (which opens a TOCTOU window between compute
            # and hand-off). Publishing the digest as a release asset makes
            # the signed-at-build value available directly to the router.
            sha256sum "/tmp/${APP}-${VERSION}.zip" | awk '{print $1}' > "/tmp/${APP}-${VERSION}.zip.sha256"
            echo "  SHA-256: $(cat /tmp/${APP}-${VERSION}.zip.sha256)"

            # Clean up bundled binaries from source tree (don't commit them)
            rm -rf "$APP_DIR/bin/amd64" "$APP_DIR/bin/arm64"

            # Create or update release
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG exists — updating assets"
              gh release upload "$TAG" \
                "/tmp/${APP}-${VERSION}.zip#${APP}-${VERSION}.zip" \
                "/tmp/${APP}-${VERSION}.zip.sha256#${APP}-${VERSION}.zip.sha256" \
                --clobber
            else
              echo "Creating release $TAG"
              gh release create "$TAG" \
                "/tmp/${APP}-${VERSION}.zip#${APP}-${VERSION}.zip" \
                "/tmp/${APP}-${VERSION}.zip.sha256#${APP}-${VERSION}.zip.sha256" \
                --title "@${APP} v${VERSION}" \
                --notes "Auto-release from push to main (includes CLIProxyAPI ${CLIPROXY_VERSION:-n/a})" \
                --latest=false
            fi

            echo "✅ Released: https://github.com/${{ github.repository }}/releases/download/${TAG}/${APP}-${VERSION}.zip"
          done
