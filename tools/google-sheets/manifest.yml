slug: google-sheets
identifier: com.xshopper.google-sheets
kind: tool
name: Google Sheets
description: Read, write, and manage Google Sheets spreadsheets
icon: "\U0001F4CA"
version: 1.0.0

authProvider: google
baseUrl: https://sheets.googleapis.com/v4

operations:
  # NOTE: `list` intentionally overrides `baseUrl` by using an absolute
  # URL — the Sheets v4 API does not expose a "list my spreadsheets"
  # endpoint, so we query Drive v3 filtered by the spreadsheet MIME type.
  # The platform tool-SDK resolver (xaiworkspace-backend/src/tool-sdk.js)
  # supports absolute HTTPS `path` values by using them verbatim instead
  # of prepending `baseUrl`. Same OAuth scope (`drive.readonly`) covers
  # both endpoints. Do NOT split into a separate `google-drive` manifest
  # without first migrating installed tools — identifier changes break
  # existing user connections.
  - name: list
    description: List your spreadsheets
    method: GET
    path: https://www.googleapis.com/drive/v3/files
    query:
      q: "mimeType='application/vnd.google-apps.spreadsheet'"
      fields: "files(id,name,modifiedTime,webViewLink)"
  - name: get
    description: Get spreadsheet metadata including all sheet tabs
    method: GET
    path: /spreadsheets/{spreadsheetId}
  - name: read
    description: Read data from a spreadsheet range
    method: GET
    path: /spreadsheets/{spreadsheetId}/values/{range}
  - name: write
    description: Write data to a spreadsheet range
    method: PUT
    path: /spreadsheets/{spreadsheetId}/values/{range}
    query:
      valueInputOption: "USER_ENTERED"
  - name: append
    description: Append rows to a spreadsheet
    method: POST
    path: /spreadsheets/{spreadsheetId}/values/{range}:append
    query:
      valueInputOption: "USER_ENTERED"
  - name: create
    description: Create a new spreadsheet
    method: POST
    path: /spreadsheets
  - name: clear
    description: Clear values from a spreadsheet range
    method: POST
    path: /spreadsheets/{spreadsheetId}/values/{range}:clear
  - name: batch-get
    description: Read multiple ranges from a spreadsheet in one request (ranges query param required, e.g. ?ranges=Sheet1!A1:B2&ranges=Sheet2!A1:C5)
    method: GET
    path: /spreadsheets/{spreadsheetId}/values:batchGet

permissions: {}

sandbox: strict
