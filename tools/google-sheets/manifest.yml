slug: google-sheets
kind: tool
name: Google Sheets
description: Read, write, and manage Google Sheets spreadsheets
icon: "\U0001F4CA"
version: 1.0.0

authProvider: google
baseUrl: https://sheets.googleapis.com/v4

operations:
  - name: list-spreadsheets
    description: List all Google Sheets spreadsheets in the user's Drive
    method: GET
    path: https://www.googleapis.com/drive/v3/files?q=mimeType='application/vnd.google-apps.spreadsheet'&fields=files(id,name,modifiedTime)
  - name: read
    description: Read data from a spreadsheet range
    method: GET
    path: /spreadsheets/{spreadsheetId}/values/{range}
  - name: write
    description: Write data to a spreadsheet range
    method: PUT
    path: /spreadsheets/{spreadsheetId}/values/{range}
  - name: append
    description: Append rows to a spreadsheet
    method: POST
    path: /spreadsheets/{spreadsheetId}/values/{range}:append
  - name: create
    description: Create a new spreadsheet
    method: POST
    path: /spreadsheets
  - name: get-spreadsheet
    description: Get spreadsheet metadata including all sheet tabs
    method: GET
    path: /spreadsheets/{spreadsheetId}
  - name: clear
    description: Clear values from a spreadsheet range
    method: POST
    path: /spreadsheets/{spreadsheetId}/values/{range}:clear
  - name: batch-get
    description: Read multiple ranges from a spreadsheet in one request
    method: GET
    path: /spreadsheets/{spreadsheetId}/values:batchGet

permissions:
  integrations: [google]

sandbox: strict
