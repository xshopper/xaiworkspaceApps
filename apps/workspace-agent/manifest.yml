slug: workspace-agent
identifier: com.xshopper.workspace-agent
kind: app
name: Workspace Agent
description: WS bridge between the router and installed apps. Routes messages to app endpoints declared in manifests.
icon: "\U0001F50C"
version: 1.1.0

commands:
  status: "pm2 show workspace-agent"
  logs: "pm2 logs workspace-agent --lines 40 --nostream"
  restart: "pm2 restart workspace-agent"

singleton: true
cleanup: "echo 'workspace-agent is a system process'"

service:
  order: 5
