slug: agent
identifier: com.xaiworkspace.agent
kind: agent
name: Agent
description: AI agent with configurable persona — runs Claude Code in your workspace with inter-agent messaging
icon: "\U0001F916"
version: 0.1.0

startup: "node index.js"

# No top-level `model:` field is set here intentionally. Unlike most apps,
# the @agent mini-app is multi-instance and lets each installed agent
# pick its own model via the install-time `model` parameter below. The
# entry point (`index.js`) reads `PARAMS.model` and passes it directly to
# the Claude Agent SDK via `options.model`. If omitted, the SDK falls back
# to its default. Setting a top-level `model` here would not do anything
# useful — the install parameter takes precedence.

parameters:
  - name: persona
    label: Agent Persona
    type: select
    required: true
    enum:
      - { value: "pm", label: "Project Manager" }
      - { value: "developer", label: "Senior Developer" }
      - { value: "tester", label: "QA Tester" }
      - { value: "reviewer", label: "Code Reviewer" }
  - name: model
    label: Default Model
    type: select
    default: "claude-sonnet-4-6"
    enum:
      - { value: "claude-haiku-4-5-20251001", label: "Haiku (Fast)" }
      - { value: "claude-sonnet-4-6", label: "Sonnet (Balanced)" }
      - { value: "claude-opus-4-6", label: "Opus (Best)" }
  - name: public
    label: Public Agent
    type: boolean
    default: false
    description: >
      Make this agent addressable by anyone in the same domain as
      `domain/com.xaiworkspace.agent/<name>` (no worker_id). Names must be
      unique across the domain when public.

permissions:
  resources: [storage]
  chat: [chat.send, chat.read, chat.listen]

sandbox: relaxed

# Permission model notes
# ----------------------
# The agent runs Claude Code with `permissionMode: 'default'` (NEVER
# `bypassPermissions`). In SDK `default` mode the SDK itself enforces an
# allowlist: any tool NOT in `options.allowedTools` triggers the
# host's `canUseTool` callback before execution. Because this mini-app
# does not currently supply a `canUseTool` hook, the SDK's built-in
# interactive approval UI is invoked — which in a non-interactive
# pm2 / headless deployment causes the tool call to be declined.
#
# That is the correct default for an autonomous agent: inter-agent
# messages can't silently mutate the filesystem or shell out. If an
# installed agent needs autonomous shell/file/network access, we intend
# to plumb an explicit `canUseTool` callback that consults the workspace
# platform's `approvalRequired` machinery (below) rather than loosening
# the SDK mode.
#
# The `approvalRequired` field below is the *platform-level* gate — it
# applies to high-level agent actions (e.g. `email.send`), not to
# low-level Claude Code tools. The SDK's tool gate is a separate layer.
approvalRequired:
  # Destructive / externally-visible actions — always prompt the user.
  - shell.exec
  - fs.write
  - fs.delete
  - net.fetch
  - agent.send  # inter-agent messages originating from this agent
