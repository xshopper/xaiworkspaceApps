<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File Viewer</title>
<style>
/* ── Reset & base ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

/* ── CSS custom properties — mirror host design tokens ──────────── */
:root {
  --surface-base: #fcfcfc;
  --surface-l1: #f7f7f7;
  --surface-l2: #f2f2f2;
  --border-l1: #e8e8e8;
  --fg-primary: #050505;
  --fg-secondary: #636363;
  --fg-tertiary: #9a9a9a;
  --fg-link: #2D7AB8;
  --fg-positive: #0d7a5f;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-size-xs: 11px;
  --font-size-sm: 13px;
  --font-size-base: 14px;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
}
[data-theme="dark"] {
  --surface-base: #111111;
  --surface-l1: #1a1a1a;
  --surface-l2: #222222;
  --border-l1: #2e2e2e;
  --fg-primary: #f0f0f0;
  --fg-secondary: #a0a0a0;
  --fg-tertiary: #666666;
  --fg-link: #6ab0e8;
  --fg-positive: #2ecc9a;
}

/* ── Layout ──────────────────────────────────────────────────────── */
body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: var(--surface-base); color: var(--fg-primary); }
#app { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ─────────────────────────────────────────────────────── */
#sidebar {
  width: 260px; min-width: 180px; max-width: 400px;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border-l1);
  background: var(--surface-l1);
  overflow: hidden;
}
#sidebar-header { padding: 10px 12px; border-bottom: 1px solid var(--border-l1); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
#root-selector {
  flex: 1; font-size: var(--font-size-sm); background: var(--surface-l2);
  border: 1px solid var(--border-l1); border-radius: var(--radius-sm);
  padding: 4px 8px; color: var(--fg-primary); cursor: pointer;
}
#root-selector:focus { outline: 2px solid var(--fg-link); outline-offset: -1px; }
#refresh-btn {
  padding: 4px 8px; border: 1px solid var(--border-l1); border-radius: var(--radius-sm);
  background: var(--surface-base); color: var(--fg-secondary); cursor: pointer; font-size: 14px;
  line-height: 1; flex-shrink: 0;
}
#refresh-btn:hover { background: var(--surface-l2); color: var(--fg-primary); }
#search-bar { padding: 8px 12px; border-bottom: 1px solid var(--border-l1); flex-shrink: 0; }
#search-input {
  width: 100%; padding: 5px 8px; font-size: var(--font-size-sm);
  border: 1px solid var(--border-l1); border-radius: var(--radius-sm);
  background: var(--surface-base); color: var(--fg-primary);
}
#search-input:focus { outline: 2px solid var(--fg-link); outline-offset: -1px; }
#tree-container { flex: 1; overflow-y: auto; padding: 6px 0; }
#search-results { flex: 1; overflow-y: auto; }

/* ── File tree ───────────────────────────────────────────────────── */
.tree-item {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px 3px 0; cursor: pointer; user-select: none;
  font-size: var(--font-size-sm); color: var(--fg-secondary);
  border-radius: var(--radius-sm); margin: 1px 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tree-item:hover { background: var(--surface-l2); color: var(--fg-primary); }
.tree-item.active { background: var(--surface-l2); color: var(--fg-primary); font-weight: 500; }
.tree-item .indent { flex-shrink: 0; display: inline-block; }
.tree-item .arrow { width: 14px; flex-shrink: 0; color: var(--fg-tertiary); font-size: 10px; text-align: center; }
.tree-item .icon { flex-shrink: 0; width: 16px; text-align: center; font-size: 13px; }
.tree-item .name { overflow: hidden; text-overflow: ellipsis; }
.tree-children { display: none; }
.tree-children.open { display: block; }
.tree-loading { padding: 6px 16px; font-size: var(--font-size-xs); color: var(--fg-tertiary); }

/* ── Search results ──────────────────────────────────────────────── */
.search-result {
  padding: 6px 12px; cursor: pointer; font-size: var(--font-size-sm);
  border-bottom: 1px solid var(--border-l1); color: var(--fg-secondary);
}
.search-result:hover { background: var(--surface-l2); color: var(--fg-primary); }
.search-result .sr-name { font-weight: 500; color: var(--fg-primary); }
.search-result .sr-path { font-size: var(--font-size-xs); color: var(--fg-tertiary); margin-top: 2px; word-break: break-all; }
.search-empty { padding: 16px; text-align: center; color: var(--fg-tertiary); font-size: var(--font-size-sm); }

/* ── Main content ────────────────────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--surface-base); }
#breadcrumb { padding: 8px 16px; border-bottom: 1px solid var(--border-l1); background: var(--surface-l1); font-size: var(--font-size-xs); color: var(--fg-tertiary); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; flex-shrink: 0; min-height: 36px; }
.breadcrumb-sep { color: var(--fg-tertiary); }
.breadcrumb-seg { cursor: pointer; color: var(--fg-link); }
.breadcrumb-seg:hover { text-decoration: underline; }
.breadcrumb-seg.current { color: var(--fg-primary); cursor: default; font-weight: 500; }
.breadcrumb-seg.current:hover { text-decoration: none; }

#file-toolbar {
  padding: 8px 16px; border-bottom: 1px solid var(--border-l1);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  background: var(--surface-l1); min-height: 44px;
}
#file-toolbar .file-name { font-size: var(--font-size-sm); font-weight: 500; color: var(--fg-primary); }
#file-toolbar .file-meta { font-size: var(--font-size-xs); color: var(--fg-tertiary); margin-left: auto; }
.toolbar-btn {
  padding: 4px 10px; border: 1px solid var(--border-l1); border-radius: var(--radius-sm);
  background: var(--surface-base); color: var(--fg-secondary); cursor: pointer;
  font-size: var(--font-size-xs); font-weight: 500; white-space: nowrap;
}
.toolbar-btn:hover { background: var(--surface-l2); color: var(--fg-primary); }
.toolbar-btn:active { background: var(--border-l1); }
.lang-badge {
  padding: 2px 7px; background: var(--surface-l2); border: 1px solid var(--border-l1);
  border-radius: var(--radius-sm); font-size: var(--font-size-xs); color: var(--fg-tertiary);
}

#content-area { flex: 1; overflow: auto; }

/* ── Empty / loading states ──────────────────────────────────────── */
#empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--fg-tertiary); gap: 8px;
}
#empty-state .empty-icon { font-size: 40px; }
#empty-state .empty-text { font-size: var(--font-size-sm); }
.loading-spinner { text-align: center; padding: 32px; color: var(--fg-tertiary); font-size: var(--font-size-sm); }

/* ── Code viewer ─────────────────────────────────────────────────── */
#content-area pre {
  margin: 0; padding: 16px; font-family: var(--font-mono); font-size: 13px;
  line-height: 1.6; background: var(--surface-base); color: var(--fg-primary);
  tab-size: 2; overflow-x: auto; min-height: 100%;
}
#content-area pre code { font-family: inherit; font-size: inherit; background: none; padding: 0; }
.line-numbers { counter-reset: line; }
.line-numbers .line::before {
  counter-increment: line; content: counter(line);
  display: inline-block; width: 40px; margin-right: 16px;
  text-align: right; color: var(--fg-tertiary); user-select: none;
}

/* ── Markdown viewer ─────────────────────────────────────────────── */
.md-body { padding: 24px; max-width: 800px; line-height: 1.7; font-size: var(--font-size-base); color: var(--fg-primary); }
.md-body h1, .md-body h2, .md-body h3 { margin: 1.5em 0 .5em; font-weight: 600; }
.md-body h1 { font-size: 1.6em; border-bottom: 1px solid var(--border-l1); padding-bottom: .4em; }
.md-body h2 { font-size: 1.3em; border-bottom: 1px solid var(--border-l1); padding-bottom: .3em; }
.md-body p { margin: .75em 0; }
.md-body ul, .md-body ol { margin: .5em 0; padding-left: 1.5em; }
.md-body li { margin: .25em 0; }
.md-body code { background: var(--surface-l2); padding: 2px 5px; border-radius: 4px; font-family: var(--font-mono); font-size: .9em; }
.md-body pre { background: var(--surface-l1); border: 1px solid var(--border-l1); border-radius: var(--radius-md); padding: 12px 16px; margin: 1em 0; overflow-x: auto; }
.md-body pre code { background: none; padding: 0; }
.md-body blockquote { border-left: 3px solid var(--border-l1); padding-left: 1em; margin: 1em 0; color: var(--fg-secondary); }
.md-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
.md-body th, .md-body td { border: 1px solid var(--border-l1); padding: 6px 12px; text-align: left; }
.md-body th { background: var(--surface-l1); font-weight: 600; }
.md-body a { color: var(--fg-link); }
.md-body hr { border: none; border-top: 1px solid var(--border-l1); margin: 1.5em 0; }
.md-body img { max-width: 100%; border-radius: var(--radius-sm); }

/* ── Image viewer ────────────────────────────────────────────────── */
.img-viewer { display: flex; align-items: center; justify-content: center; padding: 24px; min-height: 200px; }
.img-viewer img { max-width: 100%; max-height: 70vh; border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); }

/* ── JSON viewer ─────────────────────────────────────────────────── */
.json-viewer { padding: 16px; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; }
.json-key { color: #a855f7; }
[data-theme="dark"] .json-key { color: #c084fc; }
.json-str { color: #16a34a; }
[data-theme="dark"] .json-str { color: #4ade80; }
.json-num { color: #2563eb; }
[data-theme="dark"] .json-num { color: #60a5fa; }
.json-bool { color: #d97706; }
[data-theme="dark"] .json-bool { color: #fbbf24; }
.json-null { color: var(--fg-tertiary); }
.json-toggle { cursor: pointer; user-select: none; color: var(--fg-tertiary); }
.json-toggle:hover { color: var(--fg-link); }
.json-collapsed { color: var(--fg-tertiary); }
.json-children { padding-left: 20px; }
.json-children.hidden { display: none; }

/* ── Binary / large file ─────────────────────────────────────────── */
.file-info-card {
  margin: 32px auto; max-width: 360px; border: 1px solid var(--border-l1);
  border-radius: var(--radius-lg); padding: 24px; text-align: center; background: var(--surface-l1);
}
.file-info-card .fi-icon { font-size: 40px; margin-bottom: 12px; }
.file-info-card .fi-name { font-size: var(--font-size-base); font-weight: 600; margin-bottom: 4px; }
.file-info-card .fi-meta { font-size: var(--font-size-sm); color: var(--fg-tertiary); margin-bottom: 16px; }
.file-info-card .fi-btn {
  display: inline-block; padding: 8px 20px; background: var(--fg-link); color: #fff;
  border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: var(--font-size-sm); font-weight: 500;
}
.file-info-card .fi-btn:hover { opacity: .9; }

/* ── Toast ───────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--fg-primary); color: var(--surface-base); padding: 8px 16px;
  border-radius: var(--radius-full, 999px); font-size: var(--font-size-sm);
  transition: transform .2s ease; z-index: 1000; white-space: nowrap;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── Mobile ──────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  #app { position: relative; }
  #sidebar { position: absolute; inset: 0; z-index: 10; width: 100%; transform: translateX(0); transition: transform .2s; }
  #sidebar.hidden { transform: translateX(-100%); }
  #main { width: 100%; }
  #back-btn { display: flex !important; }
}
#back-btn {
  display: none; align-items: center; gap: 4px; padding: 4px 8px;
  border: none; background: none; color: var(--fg-link); cursor: pointer; font-size: var(--font-size-sm);
}

/* ── Scrollbar ───────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-l1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--fg-tertiary); }

/* ── highlight.js theme (adapted for light/dark tokens) ─────────── */
.hljs { background: transparent !important; color: var(--fg-primary) !important; }
.hljs-keyword, .hljs-selector-tag, .hljs-literal { color: #9333ea; font-weight: 600; }
[data-theme="dark"] .hljs-keyword, [data-theme="dark"] .hljs-selector-tag, [data-theme="dark"] .hljs-literal { color: #c084fc; }
.hljs-string, .hljs-attr { color: #16a34a; }
[data-theme="dark"] .hljs-string, [data-theme="dark"] .hljs-attr { color: #4ade80; }
.hljs-number, .hljs-regexp { color: #2563eb; }
[data-theme="dark"] .hljs-number, [data-theme="dark"] .hljs-regexp { color: #60a5fa; }
.hljs-comment { color: var(--fg-tertiary); font-style: italic; }
.hljs-type, .hljs-class .hljs-title, .hljs-title { color: #0369a1; font-weight: 600; }
[data-theme="dark"] .hljs-type, [data-theme="dark"] .hljs-title { color: #38bdf8; }
.hljs-variable, .hljs-template-variable { color: #b45309; }
[data-theme="dark"] .hljs-variable, [data-theme="dark"] .hljs-template-variable { color: #fbbf24; }
.hljs-built_in, .hljs-symbol { color: #0891b2; }
[data-theme="dark"] .hljs-built_in, [data-theme="dark"] .hljs-symbol { color: #67e8f9; }
.hljs-tag .hljs-name { color: #0369a1; }
[data-theme="dark"] .hljs-tag .hljs-name { color: #38bdf8; }
.hljs-section, .hljs-name { color: #9333ea; }
[data-theme="dark"] .hljs-section, [data-theme="dark"] .hljs-name { color: #c084fc; }
.hljs-addition { background: #dcfce7; color: #15803d; }
[data-theme="dark"] .hljs-addition { background: #052e16; color: #4ade80; }
.hljs-deletion { background: #fee2e2; color: #b91c1c; }
[data-theme="dark"] .hljs-deletion { background: #450a0a; color: #f87171; }
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <select id="root-selector">
        <option value="/workspace">/workspace</option>
        <option value="/home">/home</option>
        <option value="/data">/data</option>
        <option value="/var/log">/var/log</option>
        <option value="/tmp">/tmp</option>
        <option value="/app">/app</option>
      </select>
      <button id="refresh-btn" title="Refresh">&#8635;</button>
    </div>
    <div id="search-bar">
      <input id="search-input" type="text" placeholder="Search files... (/)" autocomplete="off" spellcheck="false">
    </div>
    <div id="tree-container"></div>
    <div id="search-results" style="display:none"></div>
  </div>

  <!-- Main content -->
  <div id="main">
    <div id="breadcrumb"></div>
    <div id="file-toolbar" style="display:none">
      <button id="back-btn">&#8592; Back</button>
      <span class="file-name" id="toolbar-filename"></span>
      <span class="lang-badge" id="toolbar-lang" style="display:none"></span>
      <span class="file-meta" id="toolbar-meta"></span>
      <button class="toolbar-btn" id="btn-copy" style="display:none">Copy</button>
      <button class="toolbar-btn" id="btn-share" style="display:none">Share</button>
      <button class="toolbar-btn" id="btn-download" style="display:none">Download</button>
    </div>
    <div id="content-area">
      <div id="empty-state">
        <div class="empty-icon">&#128194;</div>
        <div class="empty-text">Select a file to view its contents</div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
// ── xAI SDK client ────────────────────────────────────────────────
// Wraps window.postMessage into a Promise-based xai.* API.
(function() {
  let initData = null;
  // Batch D #F2 — every outbound sandbox:* message (except the bootstrap
  // sandbox:ready) must include a `slug` that matches the host-side instance
  // slug. The host drops messages without a matching slug as a defense
  // against cross-iframe impersonation. We learn the slug from host:init
  // and cache it here so subsequent requests can tag themselves.
  let appSlug = 'file-viewer';
  const pending = new Map(); // id → { resolve, reject }
  let msgId = 0;
  const listeners = {};

  function genId() { return 'r' + (++msgId); }

  function request(action, payload) {
    return new Promise((resolve, reject) => {
      const id = genId();
      pending.set(id, { resolve, reject });
      window.parent.postMessage({ type: 'sandbox:request', id, action, payload, slug: appSlug }, '*');
    });
  }

  window.addEventListener('message', (e) => {
    const msg = e.data;
    if (!msg || typeof msg.type !== 'string') return;

    if (msg.type === 'host:init') {
      initData = msg;
      // Capture authoritative slug from host init so all subsequent
      // sandbox:* messages can tag themselves correctly.
      if (typeof msg.appSlug === 'string' && msg.appSlug) appSlug = msg.appSlug;
      document.documentElement.setAttribute('data-theme', msg.theme || 'light');
      fireEvent('ready', msg);
      return;
    }
    if (msg.type === 'host:response') {
      const p = pending.get(msg.id);
      if (!p) return;
      pending.delete(msg.id);
      if (msg.ok) p.resolve(msg.data);
      else p.reject(new Error(msg.error || 'Request failed'));
      return;
    }
    if (msg.type === 'host:event') {
      if (msg.event === 'theme.changed' && msg.payload?.theme) {
        document.documentElement.setAttribute('data-theme', msg.payload.theme);
      }
      fireEvent(msg.event, msg.payload);
      return;
    }
    if (msg.type === 'host:chat.message') {
      fireEvent('chat.message', { text: msg.text, sender: msg.sender });
      return;
    }
    if (msg.type === 'host:shutdown') {
      fireEvent('shutdown', {});
      return;
    }
  });

  function fireEvent(name, payload) {
    (listeners[name] || []).forEach(fn => { try { fn(payload); } catch(e) {} });
  }

  window.xai = {
    get config() { return initData?.config || {}; },
    get permissions() { return initData?.permissions || []; },
    get instanceId() { return initData?.instanceId || null; },
    get platform() { return initData?.platform || 'web'; },
    get theme() { return document.documentElement.getAttribute('data-theme') || 'light'; },
    on(event, fn) { (listeners[event] = listeners[event] || []).push(fn); },
    storage: {
      get: (key) => request('storage.get', { key }),
      set: (key, value) => request('storage.set', { key, value }),
      delete: (key) => request('storage.delete', { key }),
      list: (prefix) => request('storage.list', { prefix }),
    },
    instance: {
      files: {
        list: (payload) => request('instance.files.list', payload),
        read: (payload) => request('instance.files.read', payload),
        search: (payload) => request('instance.files.search', payload),
      },
    },
    chat: {
      send: (text, buttons) => {
        window.parent.postMessage({ type: 'sandbox:chat.send', text, buttons, slug: appSlug }, '*');
      },
    },
    clipboard: {
      write: (text) => request('clipboard.write', { text }),
    },
    browser: {
      download: (payload) => request('browser.download', payload),
    },
  };

  // Signal ready
  window.parent.postMessage({ type: 'sandbox:ready', appSlug: 'file-viewer' }, '*');
})();

// ── Utilities ─────────────────────────────────────────────────────
function formatSize(bytes) {
  if (bytes == null) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

const EXT_LANG = {
  ts: 'typescript', tsx: 'typescript', js: 'javascript', jsx: 'javascript',
  mjs: 'javascript', cjs: 'javascript', py: 'python', go: 'go', rs: 'rust',
  java: 'java', kt: 'kotlin', swift: 'swift', cpp: 'cpp', cc: 'cpp', c: 'c',
  h: 'c', cs: 'csharp', rb: 'ruby', php: 'php', scala: 'scala', r: 'r',
  css: 'css', scss: 'scss', sass: 'scss', less: 'less', html: 'html',
  htm: 'html', xml: 'xml', svg: 'xml', json: 'json', yaml: 'yaml', yml: 'yaml',
  toml: 'ini', ini: 'ini', sh: 'bash', bash: 'bash', zsh: 'bash',
  fish: 'bash', ps1: 'powershell', bat: 'bat', cmd: 'bat', sql: 'sql',
  md: 'markdown', mdx: 'markdown', dockerfile: 'dockerfile', makefile: 'makefile',
  tf: 'hcl', hcl: 'hcl', proto: 'protobuf', graphql: 'graphql', gql: 'graphql',
  lua: 'lua', perl: 'perl', ex: 'elixir', exs: 'elixir', clj: 'clojure',
  dart: 'dart', env: 'bash', conf: 'bash', nginx: 'nginx',
};

const IMG_EXTS = new Set(['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp', 'ico', 'avif']);
const TEXT_EXTS = new Set(['txt', 'log', 'csv', 'tsv', 'diff', 'patch', 'lock', 'sum']);

function getExt(name) { return (name.split('.').pop() || '').toLowerCase(); }
function isImage(name) { return IMG_EXTS.has(getExt(name)); }
function isText(name) { return TEXT_EXTS.has(getExt(name)) || name.startsWith('.') || !name.includes('.'); }
function isMarkdown(name) { return ['md', 'mdx', 'markdown'].includes(getExt(name)); }
function isJson(name) { return getExt(name) === 'json'; }

function fileIcon(entry) {
  if (entry.type === 'directory') return '📁';
  const ext = getExt(entry.name);
  if (IMG_EXTS.has(ext)) return '🖼️';
  if (['pdf'].includes(ext)) return '📄';
  if (['zip', 'tar', 'gz', 'bz2', 'xz', '7z'].includes(ext)) return '📦';
  if (isMarkdown(entry.name)) return '📝';
  if (isJson(entry.name)) return '{}';
  if (['ts', 'tsx', 'js', 'jsx'].includes(ext)) return '⚡';
  if (['py'].includes(ext)) return '🐍';
  if (['html', 'htm'].includes(ext)) return '🌐';
  if (['css', 'scss', 'sass'].includes(ext)) return '🎨';
  if (['sh', 'bash', 'zsh'].includes(ext)) return '⚙️';
  if (['yml', 'yaml'].includes(ext)) return '📋';
  if (['go'].includes(ext)) return '🐹';
  if (['rs'].includes(ext)) return '🦀';
  return '📄';
}

// ── State ─────────────────────────────────────────────────────────
const state = {
  rootPath: '/workspace',
  currentPath: null,       // currently open file path
  currentContent: null,    // { content, encoding, mimeType, size, name, truncated }
  expanded: new Set(),     // set of expanded directory paths
  searchQuery: '',
  searchTimer: null,
};

// ── DOM refs ──────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const treeContainer = $('tree-container');
const searchResults = $('search-results');
const searchInput = $('search-input');
const rootSelector = $('root-selector');
const contentArea = $('content-area');
const breadcrumb = $('breadcrumb');
const fileToolbar = $('file-toolbar');
const emptyState = $('empty-state');
const toolbarFilename = $('toolbar-filename');
const toolbarLang = $('toolbar-lang');
const toolbarMeta = $('toolbar-meta');
const btnCopy = $('btn-copy');
const btnShare = $('btn-share');
const btnDownload = $('btn-download');
const sidebar = $('sidebar');
const backBtn = $('back-btn');

// ── Toast ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Breadcrumb ────────────────────────────────────────────────────
function renderBreadcrumb(path) {
  const parts = path.split('/').filter(Boolean);
  const frags = ['<span class="breadcrumb-seg" data-path="/">root</span>'];
  let built = '';
  parts.forEach((p, i) => {
    built += '/' + p;
    const isCurrent = i === parts.length - 1;
    const cls = isCurrent ? 'breadcrumb-seg current' : 'breadcrumb-seg';
    frags.push('<span class="breadcrumb-sep">/</span>');
    frags.push(`<span class="${cls}" data-path="${escHtml(built)}">${escHtml(p)}</span>`);
  });
  breadcrumb.innerHTML = frags.join('');
  breadcrumb.querySelectorAll('.breadcrumb-seg[data-path]').forEach(el => {
    el.addEventListener('click', () => {
      const p = el.dataset.path;
      if (p === '/') { navigateTo(state.rootPath); return; }
      navigateTo(p);
    });
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tree rendering ────────────────────────────────────────────────
function renderTree(container, entries, depth) {
  entries.sort((a, b) => {
    if (a.type !== b.type) return a.type === 'directory' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  entries.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.style.paddingLeft = (8 + depth * 14) + 'px';
    item.dataset.path = entry.path || ((container.dataset.parentPath || state.rootPath).replace(/\/$/, '') + '/' + entry.name);
    item.dataset.type = entry.type;

    const arrowEl = document.createElement('span');
    arrowEl.className = 'arrow';
    arrowEl.textContent = entry.type === 'directory' ? '▶' : '';
    const iconEl = document.createElement('span');
    iconEl.className = 'icon';
    iconEl.textContent = fileIcon(entry);
    const nameEl = document.createElement('span');
    nameEl.className = 'name';
    nameEl.textContent = entry.name;

    item.append(arrowEl, iconEl, nameEl);
    container.appendChild(item);

    if (entry.type === 'directory') {
      const childContainer = document.createElement('div');
      childContainer.className = 'tree-children';
      childContainer.dataset.parentPath = item.dataset.path;
      container.appendChild(childContainer);

      if (state.expanded.has(item.dataset.path)) {
        arrowEl.style.transform = 'rotate(90deg)';
        childContainer.classList.add('open');
        loadTreeChildren(item.dataset.path, childContainer, depth + 1);
      }

      item.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = childContainer.classList.contains('open');
        if (isOpen) {
          childContainer.classList.remove('open');
          arrowEl.style.transform = '';
          state.expanded.delete(item.dataset.path);
        } else {
          childContainer.classList.add('open');
          arrowEl.style.transform = 'rotate(90deg)';
          state.expanded.add(item.dataset.path);
          if (!childContainer.dataset.loaded) {
            loadTreeChildren(item.dataset.path, childContainer, depth + 1);
          }
        }
        renderBreadcrumb(item.dataset.path);
      });
    } else {
      item.addEventListener('click', () => openFile(item.dataset.path, entry.name));
    }
  });
}

async function loadTreeChildren(path, container, depth) {
  if (container.dataset.loaded) return;
  container.dataset.loaded = 'loading';
  // Clear any stale error/loading elements from previous failed attempts
  container.querySelectorAll('.tree-loading').forEach(el => el.remove());
  const loadingEl = document.createElement('div');
  loadingEl.className = 'tree-loading';
  loadingEl.textContent = 'Loading…';
  container.appendChild(loadingEl);
  try {
    const result = await xai.instance.files.list({ path });
    container.removeChild(loadingEl);
    if (!result.entries || result.entries.length === 0) {
      const emptyEl = document.createElement('div');
      emptyEl.className = 'tree-loading';
      emptyEl.textContent = 'Empty';
      container.appendChild(emptyEl);
    } else {
      renderTree(container, result.entries, depth);
    }
    container.dataset.loaded = 'done';  // only after renderTree succeeds
  } catch(e) {
    // loadingEl may or may not still be in the DOM (removed on successful list)
    if (loadingEl.parentNode === container) {
      loadingEl.textContent = 'Error: ' + e.message;
    } else {
      // renderTree threw after loadingEl was removed — re-add an error node
      container.textContent = '';
      const errEl = document.createElement('div');
      errEl.className = 'tree-loading';
      errEl.textContent = 'Error: ' + e.message;
      container.appendChild(errEl);
    }
    container.dataset.loaded = '';
  }
}

async function navigateTo(path) {
  state.rootPath = rootSelector.value = (path === '/workspace' || path.startsWith('/workspace/')) ? '/workspace'
    : (path === '/home' || path.startsWith('/home/')) ? '/home'
    : (path === '/data' || path.startsWith('/data/')) ? '/data'
    : (path === '/var/log' || path.startsWith('/var/log/')) ? '/var/log'
    : (path === '/tmp' || path.startsWith('/tmp/')) ? '/tmp'
    : (path === '/app' || path.startsWith('/app/')) ? '/app'
    : state.rootPath;

  renderBreadcrumb(path);
  clearFileView();

  treeContainer.innerHTML = '<div class="loading-spinner">Loading…</div>';
  try {
    const result = await xai.instance.files.list({ path });
    treeContainer.innerHTML = '';
    treeContainer.dataset.parentPath = path;
    if (!result.entries || result.entries.length === 0) {
      treeContainer.innerHTML = '<div class="tree-loading">Empty directory</div>';
    } else {
      renderTree(treeContainer, result.entries, 0);
    }
    await xai.storage.set('lastPath', path);
  } catch(e) {
    treeContainer.innerHTML = `<div class="tree-loading" style="color:var(--fg-tertiary)">Error: ${escHtml(e.message)}</div>`;
  }
}

// ── File opening ──────────────────────────────────────────────────
async function openFile(path, name) {
  // Highlight active item
  document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
  const activeItem = document.querySelector(`.tree-item[data-path="${CSS.escape(path)}"]`);
  if (activeItem) activeItem.classList.add('active');

  state.currentPath = path;
  state.currentContent = null;
  renderBreadcrumb(path);

  // Mobile: hide sidebar, show content
  sidebar.classList.add('hidden');

  contentArea.innerHTML = '<div class="loading-spinner">Loading…</div>';
  fileToolbar.style.display = 'flex';
  emptyState && (emptyState.style.display = 'none');
  toolbarFilename.textContent = name;
  toolbarLang.style.display = 'none';
  toolbarMeta.textContent = '';
  btnCopy.style.display = 'none';
  btnShare.style.display = 'none';
  btnDownload.style.display = 'none';

  try {
    const result = await xai.instance.files.read({ path });
    state.currentContent = result;

    toolbarMeta.textContent = formatSize(result.size);

    if (result.truncated) {
      renderTruncated(result);
      btnDownload.style.display = '';
      return;
    }

    if (isImage(name)) {
      renderImage(result, name);
    } else if (isMarkdown(name)) {
      renderMarkdown(result.content || '');
      btnCopy.style.display = '';
      btnShare.style.display = '';
    } else if (isJson(name)) {
      try {
        renderJsonTree(JSON.parse(result.content || 'null'));
        btnCopy.style.display = '';
        btnShare.style.display = '';
      } catch {
        renderCode(result.content || '', name);
        btnCopy.style.display = '';
      }
    } else {
      renderCode(result.content || '', name);
      btnCopy.style.display = '';
      btnShare.style.display = '';
      if (result.size > 0) btnDownload.style.display = '';
    }
  } catch(e) {
    contentArea.innerHTML = `<div class="file-info-card">
      <div class="fi-icon">⚠️</div>
      <div class="fi-name">${escHtml(name)}</div>
      <div class="fi-meta">${escHtml(e.message)}</div>
    </div>`;
  }
}

function clearFileView() {
  state.currentPath = null;
  state.currentContent = null;
  contentArea.innerHTML = '';
  if (emptyState) { emptyState.style.display = ''; contentArea.appendChild(emptyState); }
  fileToolbar.style.display = 'none';
  document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
}

// ── Renderers ─────────────────────────────────────────────────────
function renderCode(text, filename) {
  const ext = getExt(filename);
  const lang = EXT_LANG[ext] || EXT_LANG[filename.toLowerCase()] || null;

  if (lang) {
    toolbarLang.textContent = lang;
    toolbarLang.style.display = '';
  }

  const pre = document.createElement('pre');
  const code = document.createElement('code');

  // Simple tokenizer for common patterns (no external lib dependency)
  // Falls back to escaped text if no language match
  if (lang && window.hljs) {
    code.innerHTML = hljs.highlight(text, { language: lang, ignoreIllegals: true }).value;
  } else {
    code.textContent = text;
    pre.classList.add('line-numbers');
    code.innerHTML = code.innerHTML.replace(/^(.*)$/gm, '<span class="line">$1</span>');
  }

  pre.appendChild(code);
  contentArea.innerHTML = '';
  contentArea.appendChild(pre);
}

function renderMarkdown(text) {
  // Minimal markdown renderer — handles common patterns
  let html = escHtml(text);
  // Fenced code blocks FIRST — before inline substitutions.
  // inner is already HTML-safe because the full text was escHtml()'d above.
  html = html
    .replace(/```[\s\S]*?```/g, m => {
      const lines = m.split('\n');
      const inner = lines.slice(1, -1).join('\n');
      return `<pre><code>${inner}</code></pre>`;
    });
  html = html
    .replace(/^######\s+(.+)$/gm, '<h6>$1</h6>')
    .replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>')
    .replace(/^####\s+(.+)$/gm, '<h4>$1</h4>')
    .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
    .replace(/^#\s+(.+)$/gm, '<h1>$1</h1>')
    .replace(/^---+$/gm, '<hr>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g, (_, text, url) => {
      const safe = /^(https?:\/\/|#)/.test(url);
      return safe ? `<a href="${url}" target="_blank" rel="noopener">${text}</a>` : `[${text}](${url})`;
    })
    .replace(/!\[(.+?)\]\((.+?)\)/g, (_, alt, url) => {
      const safe = /^(https?:\/\/|data:image\/)/.test(url);
      return safe ? `<img src="${url}" alt="${alt}">` : `![${alt}](${url})`;
    })
    .replace(/^&gt;\s+(.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^[-*]\s+(.+)$/gm, '<li class="ul">$1</li>')
    .replace(/(<li class="ul">.*<\/li>(\n|$))+/g, m => '<ul>' + m.replace(/ class="ul"/g, '') + '</ul>')
    .replace(/^\d+\.\s+(.+)$/gm, '<li class="ol">$1</li>')
    .replace(/(<li class="ol">.*<\/li>(\n|$))+/g, m => '<ol>' + m.replace(/ class="ol"/g, '') + '</ol>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  contentArea.innerHTML = `<div class="md-body">${html}</div>`;
}

function renderImage(result, name) {
  const ext = getExt(name);
  const mimeType = result.mimeType || (ext === 'svg' ? 'image/svg+xml' : 'image/' + ext);
  let src;
  if (result.encoding === 'base64') {
    src = `data:${mimeType};base64,${result.content}`;
  } else {
    src = `data:${mimeType};charset=utf-8,${encodeURIComponent(result.content || '')}`;
  }
  contentArea.innerHTML = `<div class="img-viewer"><img src="${src}" alt="${escHtml(name)}"></div>`;
}

function renderJsonTree(val) {
  const container = document.createElement('div');
  container.className = 'json-viewer';
  container.appendChild(buildJsonNode(val, null, true));
  contentArea.innerHTML = '';
  contentArea.appendChild(container);
}

function buildJsonNode(val, key, isRoot) {
  const frag = document.createDocumentFragment();
  const keyHtml = key != null ? `<span class="json-key">"${escHtml(String(key))}"</span>: ` : '';

  if (val === null) {
    const span = document.createElement('span');
    span.innerHTML = keyHtml + '<span class="json-null">null</span>';
    frag.appendChild(span);
  } else if (typeof val === 'boolean' || typeof val === 'number') {
    const span = document.createElement('span');
    const cls = typeof val === 'boolean' ? 'json-bool' : 'json-num';
    span.innerHTML = keyHtml + `<span class="${cls}">${val}</span>`;
    frag.appendChild(span);
  } else if (typeof val === 'string') {
    const span = document.createElement('span');
    const truncated = val.length > 200 ? val.slice(0, 200) + '…' : val;
    span.innerHTML = keyHtml + `<span class="json-str">"${escHtml(truncated)}"</span>`;
    frag.appendChild(span);
  } else if (Array.isArray(val)) {
    const wrapper = document.createElement('div');
    const header = document.createElement('div');
    const childDiv = document.createElement('div');
    childDiv.className = 'json-children';
    const toggle = document.createElement('span');
    toggle.className = 'json-toggle';
    toggle.textContent = val.length > 0 ? '▶ ' : '';
    const label = document.createElement('span');
    label.innerHTML = keyHtml;
    header.appendChild(toggle);
    header.appendChild(label);
    header.appendChild(document.createTextNode('['));
    if (val.length === 0) {
      header.appendChild(document.createTextNode(']'));
    } else {
      const collapsed = document.createElement('span');
      collapsed.className = 'json-collapsed';
      collapsed.textContent = `${val.length} items]`;
      header.appendChild(collapsed);
      wrapper.appendChild(header);
      val.forEach((item, i) => {
        const childRow = document.createElement('div');
        childRow.appendChild(buildJsonNode(item, i, false));
        if (i < val.length - 1) childRow.appendChild(document.createTextNode(','));
        childDiv.appendChild(childRow);
      });
      childDiv.appendChild(document.createTextNode(']'));
      childDiv.classList.add('hidden');
      toggle.addEventListener('click', () => {
        const hidden = childDiv.classList.toggle('hidden');
        toggle.textContent = hidden ? '▶ ' : '▼ ';
        collapsed.style.display = hidden ? '' : 'none';
      });
    }
    wrapper.appendChild(childDiv);
    frag.appendChild(wrapper);
    return frag;
  } else if (typeof val === 'object') {
    const keys = Object.keys(val);
    const wrapper = document.createElement('div');
    const header = document.createElement('div');
    const childDiv = document.createElement('div');
    childDiv.className = 'json-children';
    const toggle = document.createElement('span');
    toggle.className = 'json-toggle';
    toggle.textContent = keys.length > 0 ? '▶ ' : '';
    const label = document.createElement('span');
    label.innerHTML = keyHtml;
    header.appendChild(toggle);
    header.appendChild(label);
    header.appendChild(document.createTextNode('{'));
    if (keys.length === 0) {
      header.appendChild(document.createTextNode('}'));
    } else {
      const collapsed = document.createElement('span');
      collapsed.className = 'json-collapsed';
      collapsed.textContent = `${keys.length} keys}`;
      header.appendChild(collapsed);
      wrapper.appendChild(header);
      keys.forEach((k, i) => {
        const childRow = document.createElement('div');
        childRow.appendChild(buildJsonNode(val[k], k, false));
        if (i < keys.length - 1) childRow.appendChild(document.createTextNode(','));
        childDiv.appendChild(childRow);
      });
      childDiv.appendChild(document.createTextNode('}'));
      childDiv.classList.add('hidden');
      toggle.addEventListener('click', () => {
        const hidden = childDiv.classList.toggle('hidden');
        toggle.textContent = hidden ? '▶ ' : '▼ ';
        collapsed.style.display = hidden ? '' : 'none';
      });
    }
    wrapper.appendChild(childDiv);
    frag.appendChild(wrapper);
    return frag;
  }
  return frag;
}

function renderTruncated(result) {
  contentArea.innerHTML = `<div class="file-info-card">
    <div class="fi-icon">${fileIcon({ name: result.name || '', type: 'file' })}</div>
    <div class="fi-name">${escHtml(result.name || '')}</div>
    <div class="fi-meta">${formatSize(result.size)} · ${escHtml(result.mimeType || 'binary')} · Too large to display inline</div>
    <button class="fi-btn" id="fi-download-btn">Download</button>
  </div>`;
  $('fi-download-btn')?.addEventListener('click', downloadCurrent);
}

// ── Search ────────────────────────────────────────────────────────
async function runSearch(query) {
  if (!query.trim()) {
    searchResults.style.display = 'none';
    treeContainer.style.display = '';
    return;
  }
  searchResults.style.display = '';
  treeContainer.style.display = 'none';
  searchResults.innerHTML = '<div class="search-empty">Searching…</div>';
  try {
    const result = await xai.instance.files.search({ query: query.trim(), path: state.rootPath });
    if (!result.results || result.results.length === 0) {
      searchResults.innerHTML = '<div class="search-empty">No results found</div>';
      return;
    }
    searchResults.innerHTML = '';
    result.results.slice(0, 200).forEach(entry => {
      const div = document.createElement('div');
      div.className = 'search-result';
      div.innerHTML = `<div class="sr-name">${fileIcon(entry)} ${escHtml(entry.name)}</div><div class="sr-path">${escHtml(entry.path)}</div>`;
      div.addEventListener('click', () => {
        searchInput.value = '';
        clearSearch();
        openFile(entry.path, entry.name);
      });
      searchResults.appendChild(div);
    });
  } catch(e) {
    searchResults.innerHTML = `<div class="search-empty">Error: ${escHtml(e.message)}</div>`;
  }
}

function clearSearch() {
  state.searchQuery = '';
  searchResults.style.display = 'none';
  treeContainer.style.display = '';
}

// ── Toolbar actions ───────────────────────────────────────────────
async function copyContent() {
  const c = state.currentContent;
  if (!c) return;
  try {
    await xai.clipboard.write(c.content || '');
    showToast('Copied to clipboard');
  } catch(e) {
    showToast('Copy failed: ' + e.message);
  }
}

function shareToChat() {
  const c = state.currentContent;
  if (!c || !state.currentPath) return;
  const ext = getExt(state.currentPath.split('/').pop() || '');
  const lang = EXT_LANG[ext] || '';
  const text = c.content || '';
  const snippet = text.length > 3000 ? text.slice(0, 3000) + '\n…(truncated)' : text;
  xai.chat.send(
    `**File:** \`${state.currentPath}\`\n\`\`\`${lang}\n${snippet}\n\`\`\``
  );
  showToast('Shared to chat');
}

async function downloadCurrent() {
  const c = state.currentContent;
  if (!c) return;
  const name = state.currentPath ? state.currentPath.split('/').pop() : 'download';
  try {
    await xai.browser.download({
      content: c.content || '',
      encoding: c.encoding || 'utf-8',
      mimeType: c.mimeType || 'application/octet-stream',
      filename: name,
    });
  } catch(e) {
    showToast('Download failed: ' + e.message);
  }
}

// ── Event listeners ───────────────────────────────────────────────
btnCopy.addEventListener('click', copyContent);
btnShare.addEventListener('click', shareToChat);
btnDownload.addEventListener('click', downloadCurrent);
backBtn.addEventListener('click', () => { sidebar.classList.remove('hidden'); });

rootSelector.addEventListener('change', () => {
  state.expanded.clear();
  navigateTo(rootSelector.value);
});

$('refresh-btn').addEventListener('click', () => {
  state.expanded.clear();
  clearFileView();
  navigateTo(state.rootPath);
});

searchInput.addEventListener('input', (e) => {
  clearTimeout(state.searchTimer);
  state.searchQuery = e.target.value;
  if (!state.searchQuery.trim()) { clearSearch(); return; }
  state.searchTimer = setTimeout(() => runSearch(state.searchQuery), 350);
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { searchInput.value = ''; clearSearch(); searchInput.blur(); }
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});

// ── Initialise on SDK ready ───────────────────────────────────────
xai.on('ready', async () => {
  try {
    const savedPath = await xai.storage.get('lastPath');
    const savedRoot = await xai.storage.get('rootPath');
    const validRoots = ['/workspace', '/home', '/data', '/var/log', '/tmp', '/app'];
    if (savedRoot && validRoots.includes(savedRoot)) {
      rootSelector.value = savedRoot;
      state.rootPath = savedRoot;
    }
    await navigateTo(savedPath || state.rootPath);
  } catch {
    await navigateTo(state.rootPath);
  }
});

// React to instance changes (if host broadcasts instance.changed)
xai.on('instance.changed', () => {
  state.expanded.clear();
  clearFileView();
  navigateTo(state.rootPath);
});
</script>
